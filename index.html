<!DOCTYPE html>
<html lang="en">
<head>
    <title>Three.js Kolkata 360 Panorama</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        #container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer, controls;

        init();
        animate();

        function init() {
            const container = document.getElementById('container');

            // 1. Scene & Camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);
            camera.position.set(0, 0, 0.1); // Look from inside the sphere

            // 2. The Sphere Geometry (inside-out)
            const geometry = new THREE.SphereGeometry(500, 60, 40);
            // Invert the geometry on the x-axis so that all faces point inward
            geometry.scale(-1, 1, 1);

            // 3. Load Texture and Create Material
            const texture = new THREE.TextureLoader().load('kolkata_panorama.jpg');
            texture.colorSpace = THREE.SRGBColorSpace; // Define color space for correct rendering
            const material = new THREE.MeshBasicMaterial({ map: texture });

            // 4. Mesh
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // 5. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // 6. Controls (OrbitControls makes pan/zoom easy)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // smooth rotation
            controls.dampingFactor = 0.05;
            controls.enableZoom = true; // allow zooming
            controls.minDistance = 10;
            controls.maxDistance = 100;

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // required if controls.enableDamping or controls.autoRotate are enabled
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
